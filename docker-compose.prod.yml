version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:5000"
    env_file:
      - .env.production
    environment:
      - FLASK_ENV=production
    volumes:
      - uploads:/app/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: rq worker --url redis://redis:6379/0 saasforge-jobs
    env_file:
      - .env.production
    volumes:
      - uploads:/app/app/static/uploads
    depends_on:
      - db
      - redis
    restart: always

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: rq scheduler
    env_file:
      - .env.production
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=saasforge
      - POSTGRES_USER=saasforge
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saasforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  redis_data:
  uploads:
