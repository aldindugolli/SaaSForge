{% extends "base.html" %}
{% block title %}New Chat - Knowledge Base{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="{{ url_for('knowledge.chat') }}" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300">&larr; Back to Chats</a>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mt-2">New Chat</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Ask questions about your documents</p>
    </div>

    <form method="POST" action="{{ url_for('knowledge.new_chat') }}" class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-6 space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Conversation Title</label>
            <input type="text" name="title" placeholder="e.g. Q1 Financial Report Analysis" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm focus:ring-2 focus:ring-brand-500" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Reference Document (optional)</label>
            <select name="document_id" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm focus:ring-2 focus:ring-brand-500">
                <option value="">All Documents</option>
                {% for doc in documents %}
                <option value="{{ doc.id }}">{{ doc.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="w-full px-4 py-3 bg-brand-600 text-white text-sm font-medium rounded-xl hover:bg-brand-700 transition-colors shadow-sm">
            Start Conversation
        </button>
    </form>
</div>
{% endblock %}
