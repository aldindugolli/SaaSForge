{% extends "base.html" %}
{% block title %}Create Organization — {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold">Create Organization</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Set up your workspace</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-8">
        <form method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="name" class="block text-sm font-medium mb-1.5">Organization Name</label>
                <input type="text" id="name" name="name" required
                       class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none"
                       placeholder="Acme Inc.">
            </div>
            <div>
                <label for="slug" class="block text-sm font-medium mb-1.5">URL Slug (optional)</label>
                <input type="text" id="slug" name="slug"
                       class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none"
                       placeholder="acme-inc">
                <p class="text-xs text-gray-500 mt-1">Leave blank to auto-generate</p>
            </div>
            <button type="submit" class="w-full bg-brand-600 text-white py-2.5 rounded-xl font-semibold hover:bg-brand-700 transition-colors">
                Create Organization
            </button>
        </form>
    </div>
</div>
{% endblock %}
