{% extends "base.html" %}
{% block title %}Two-Factor Authentication{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
    <h1 class="text-xl font-bold text-gray-900 text-center mb-2">Two-Factor Authentication</h1>
    <p class="text-sm text-gray-500 text-center mb-6">Enter the code from your authenticator app or a backup code.</p>

    <form method="POST" action="{{ url_for('auth.two_factor_challenge') }}" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Authentication Code</label>
        <input type="text" name="code" inputmode="numeric" autocomplete="one-time-code"
               class="w-full px-4 py-2 text-center text-2xl tracking-widest border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
               placeholder="000000" required>
      </div>

      <button type="submit" class="w-full bg-brand-600 text-white py-2 px-4 rounded-lg hover:bg-brand-700 font-medium">
        Verify
      </button>
    </form>
  </div>
</div>
{% endblock %}
