{% extends "base.html" %}
{% block title %}Two-Factor Authentication — {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-gradient-to-br from-brand-500 to-brand-700 rounded-2xl flex items-center justify-center shadow-sm mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold tracking-tight">Two-Factor Authentication</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-1">Enter the code from your authenticator app or a backup code.</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-md border border-gray-200 dark:border-gray-700 p-8">
      <form method="POST" action="{{ url_for('auth.two_factor_challenge') }}" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div>
          <label class="block text-sm font-medium mb-1.5">Authentication Code</label>
          <input type="text" name="code" inputmode="numeric" autocomplete="one-time-code"
                 class="w-full px-4 py-2.5 text-center text-2xl tracking-[0.3em] rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all"
                 placeholder="000000" required>
        </div>

        <button type="submit" class="w-full bg-brand-600 text-white py-2.5 rounded-xl font-semibold hover:bg-brand-700 transition-colors">
          Verify
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
