{% extends "base.html" %}
{% block title %}Create Account — {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-lg">SF</span>
                </div>
                <span class="font-bold text-xl">{{ app_name }}</span>
            </a>
            <h1 class="text-2xl font-bold mt-6">Create your account</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">Start building with SaaSForge</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-8">
            <form method="POST" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label for="name" class="block text-sm font-medium mb-1.5">Full Name</label>
                    <input type="text" id="name" name="name" required
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all"
                           placeholder="John Doe">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium mb-1.5">Email</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all"
                           placeholder="you@example.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required minlength="8"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all"
                           placeholder="At least 8 characters">
                    <p class="text-xs text-gray-500 mt-1">Must contain uppercase, lowercase, number, and special character</p>
                </div>

                <button type="submit" class="w-full bg-brand-600 text-white py-2.5 rounded-xl font-semibold hover:bg-brand-700 transition-colors">
                    Create Account
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-500">
                Already have an account?
                <a href="/auth/login" class="text-brand-600 hover:text-brand-700 font-medium">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
