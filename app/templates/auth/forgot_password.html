{% extends "base.html" %}
{% block title %}Forgot Password — {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold">Reset your password</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">Enter your email and we'll send you a reset link</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-8">
            <form method="POST" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label for="email" class="block text-sm font-medium mb-1.5">Email</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition-all"
                           placeholder="you@example.com">
                </div>
                <button type="submit" class="w-full bg-brand-600 text-white py-2.5 rounded-xl font-semibold hover:bg-brand-700 transition-colors">
                    Send Reset Link
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-500">
                Remember your password?
                <a href="/auth/login" class="text-brand-600 hover:text-brand-700 font-medium">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
